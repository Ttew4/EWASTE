<html lang="en">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Stack+Sans+Headline:wght@200..700&display=swap" rel="stylesheet">

</head>
<body>

    <aside>
    <div id="logo">
        <h2 id="toggle-sidebar" style="cursor: pointer; user-select: none;">VidaUtil &lt;</h2>
        <p>E-WASTE RECYCLE</p>
    </div>
    <a id="dash" href="dashboard.html">☰ <span class="nav-text">Dashboard</span></a>
    <a id="scan" href="scanner.html">⛶ <span class="nav-text">Scanner</span></a>
    <a id="lib" href="library.html">🕮 <span class="nav-text">Library</span></a>
    <a id="com" href="community.html">🖳 <span class="nav-text">Community</span></a>
    <span class="baixo">
        <div id="bottom">
            <a id="impact" href="impact.html">᯽ <span class="nav-text">Impact Stats</span></a>
            <a id="profile" href="profile.html">🗣 <span class="nav-text">Profile</span></a>
        </div>
    </span>
    </aside>

   <main>
    <h1>Library</h1>
    
    <div id="painel-admin-library" style="display: none; background-color: rgb(13, 23, 44); padding: 20px; border-radius: 8px; margin-bottom: 30px; width: 80%; max-width: 600px; border: 1px solid rgb(78,222,163);">
        <h2 style="color: rgb(78,222,163); margin-top: 0;">Add New Video</h2>
        <input type="text" id="titulo-video" placeholder="Video Title" style="width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; background: rgb(11,19,38); color: white; border: 1px solid gray; border-radius: 4px;">
        <input type="text" id="categoria-video" placeholder="Category (Ex: Arduino, Automation, Linux)" style="width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; background: rgb(11,19,38); color: white; border: 1px solid gray; border-radius: 4px;">
        <input type="text" id="url-video" placeholder="YouTube Link" style="width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box; background: rgb(11,19,38); color: white; border: 1px solid gray; border-radius: 4px;">
        
        <button onclick="adicionarVideo()" style="padding: 10px 20px; background-color: rgb(78,222,163); color: rgb(13, 23, 44); border: none; font-weight: bold; cursor: pointer; border-radius: 4px;">Upload Video</button>
    </div>

    <div style="width: 80%; max-width: 900px; margin-bottom: 25px;">
        <input type="text" id="buscar-categoria" oninput="renderizarVideos()" placeholder="🔍 Search by category..." style="width: 100%; padding: 12px; box-sizing: border-box; background: rgb(13, 23, 44); color: white; border: 1px solid rgb(78,222,163); border-radius: 6px; font-size: 1rem;">
    </div>

    <div id="grid-videos" style="width: 80%; max-width: 900px; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px;">
    </div>
    </main>

   <script type="module" src="scripts/firebase-db.js"></script>
    <script type="module" src="scripts/script.js"></script>
</body>
</html>
